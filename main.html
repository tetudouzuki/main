<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ダッシュボード</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ナビゲーション -->
    <nav class="navbar">
        <div class="logo">My Dashboard</div>
        <ul class="nav-links">
            <li><a href="#dashboard">ダッシュボード</a></li>
            <li><a href="#contact">お問い合わせ</a></li>
        </ul>
    </nav>

    <!-- ダッシュボード -->
    <section id="dashboard" class="dashboard">
        <h1>ダッシュボード</h1>

        <div class="cards">
            <div class="card">
                <h2>売上</h2>
                <p>¥125,000</p>
            </div>

            <div class="card">
                <h2>ユーザー数</h2>
                <p>1,234</p>
            </div>

            <div class="card">
                <h2>新規登録</h2>
                <p>58</p>
            </div>
        </div>
    </section>

    <!-- お問い合わせフォーム -->
    <section id="contact" class="contact">
        <h1>お問い合わせ</h1>

        <form>
            <label>お名前</label>
            <input type="text" placeholder="お名前を入力">

            <label>メールアドレス</label>
            <input type="email" placeholder="example@email.com">

            <label>お問い合わせ内容</label>
            <textarea rows="5" placeholder="内容を入力"></textarea>

            <button type="submit">送信</button>
        </form>
    </section>

</body>
</html>
